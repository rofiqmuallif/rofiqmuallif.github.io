<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Halaman akses khusus Website Kelas TI A 2024.">
    <meta name="theme-color" content="#0f172a">
    <title>
      Web Kelas | TI A 2024
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="login-page">
      <div class="noise" aria-hidden="true">
      </div>
      <div class="orb orb-one" aria-hidden="true">
      </div>
      <div class="orb orb-two" aria-hidden="true">
      </div>
      <a class="back-link" href="../" aria-label="Kembali ke Beranda">
        <i class="fa-solid fa-arrow-left" aria-hidden="true">
        </i>
        Kembali ke Beranda
      </a>
      <section class="login-card" aria-labelledby="page-title">
        <div class="card-glow" aria-hidden="true">
        </div>
        <div class="brand">
          <img src="assets/logo-armata.png" alt="Logo ARMATA" class="brand-logo">
        </div>
        <p class="eyebrow">
          <i class="fa-solid fa-shield-halved" aria-hidden="true">
          </i>
          Akses khusus
        </p>
        <h1 id="page-title">
          Website Kelas
          <br>
          <span>
            TI A 2024
          </span>
        </h1>
        <p class="description">
          Halaman ini berisi informasi khusus mahasiswa Teknologi Informasi Kelas A. Silakan login untuk melanjutkan.
        </p>
        <form id="login-form" novalidate>
          <div class="field-group">
            <label for="username">
              Username
            </label>
            <div class="input-wrap">
              <i class="fa-regular fa-user" aria-hidden="true">
              </i>
              <input id="username" name="username" type="text" autocomplete="username" placeholder="Masukkan username" required>
            </div>
          </div>
          <div class="field-group">
            <label for="password">
              Password
            </label>
            <div class="input-wrap">
              <i class="fa-solid fa-lock" aria-hidden="true">
              </i>
              <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Masukkan password" required>
              <button class="password-toggle" type="button" aria-label="Tampilkan password" aria-pressed="false">
                <i class="fa-regular fa-eye" aria-hidden="true">
                </i>
              </button>
            </div>
          </div>
          <button class="submit-button" type="submit">
            <span class="button-text">
              Masuk
            </span>
            <span class="spinner" aria-hidden="true">
            </span>
            <i class="fa-solid fa-arrow-right" aria-hidden="true">
            </i>
          </button>
        </form>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11">
    </script>
    <script src="script.js">
    </script>
  </body>
</html>
